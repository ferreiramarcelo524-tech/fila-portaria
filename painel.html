<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel União - Controle de Expedição</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg-primary: #f0f4f8; --surface: #ffffff; --text-main: #2c3e50; --primary: #0f52ba; --primary-hover: #0a3d8c; --success: #2ecc71; --border: #dcdde1; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-primary); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; background: var(--primary); color: white; padding: 15px 30px; border-radius: 8px; margin-bottom: 25px; }
        header h1 { margin: 0; font-size: 1.6rem; }
        .card { background: var(--surface); padding: 20px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 25px; }
        .card h2 { margin-top: 0; font-size: 1.15rem; border-bottom: 2px solid var(--bg-primary); padding-bottom: 12px; color: var(--primary); }
        .btn-action { padding: 6px 12px; font-size: 0.85rem; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: 600; }
        .btn-call { background-color: var(--primary); }
        .btn-done { background-color: var(--success); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #5c6b73; }
        .badge { display: inline-block; padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        .status-aguardando { background-color: #ffeaa7; color: #b33939; }
        .status-em-doca { background-color: #74b9ff; color: #0984e3; }
        .empty-msg { text-align: center; color: #95a5a6; padding: 20px; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div>
            <h1>Painel de Monitoramento de Expedição</h1>
            <p>Controle de Pátio CD-84 Marabá</p>
        </div>
        <div id="relogio" style="font-size: 1.2rem; font-weight: bold;">00:00:00</div>
    </header>

    <section class="card">
        <h2>Fila de Espera Atual</h2>
        <table>
            <thead>
                <tr>
                    <th>Pos.</th>
                    <th>Placa</th>
                    <th>Motorista / E-mail</th>
                    <th>Chegada</th>
                    <th>Status</th>
                    <th>Doca / Conferente</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaPatioCorpo"></tbody>
        </table>
        <div id="msgPatioVazio" class="empty-msg">Nenhum veículo no pátio. Aguardando leituras...</div>
    </section>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCDv9K7VtXwe81eAzQteQb83IYkebPasgE",
        authDomain: "expedicao-antifraud.firebaseapp.com",
        projectId: "expedicao-antifraud",
        storageBucket: "expedicao-antifraud.firebasestorage.app",
        messagingSenderId: "683256630906",
        appId: "1:683256630906:web:688866abf7f2d00e6eb5c3"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("fila_patio").onSnapshot((snapshot) => {
        const tabela = document.getElementById('tabelaPatioCorpo');
        const msg = document.getElementById('msgPatioVazio');
        let ativos = [];
        
        snapshot.forEach((doc) => {
            if(doc.data().status !== 'Concluido') {
                ativos.push({ id: doc.id, ...doc.data() });
            }
        });

        ativos.sort((a, b) => a.timestampChegada - b.timestampChegada);

        tabela.innerHTML = '';
        if (ativos.length === 0) {
            msg.style.display = 'block';
        } else {
            msg.style.display = 'none';
            ativos.forEach((v, idx) => {
                const tr = document.createElement('tr');
                let btn = v.status === 'Aguardando' ? 
                    `<button class="btn-action btn-call" onclick="chamar('${v.id}')">Chamar Doca</button>` :
                    `<button class="btn-action btn-done" onclick="liberar('${v.id}')">Liberar</button>`;

                tr.innerHTML = `
                    <td><strong>${v.status === 'Aguardando' ? (idx + 1) + 'º' : '-'}</strong></td>
                    <td><strong style="color:var(--primary); font-size:1.1rem;">${v.placa}</strong></td>
                    <td>${v.motorista}<br><small style="color:#7f8c8d">${v.email}</small></td>
                    <td>${new Date(v.timestampChegada).toLocaleTimeString('pt-BR')}</td>
                    <td><span class="badge status-${v.status.toLowerCase().replace(/ /g, '-')}">${v.status}</span></td>
                    <td>${v.status === 'Em Doca' ? `Doca: ${v.doca} (${v.conferente})` : '-'}</td>
                    <td>${btn}</td>
                `;
                tabela.appendChild(tr);
            });
        }
    });

    window.chamar = (id) => {
        const d = prompt("Número da Doca:");
        const c = prompt("Nome do Conferente:");
        if (d && c) db.collection("fila_patio").doc(id).update({ status: "Em Doca", doca: d, conferente: c });
    };

    window.liberar = (id) => {
        if (confirm("Confirmar liberação do veículo?")) db.collection("fila_patio").doc(id).update({ status: "Concluido" });
    };

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
</script>
</body>
</html>
